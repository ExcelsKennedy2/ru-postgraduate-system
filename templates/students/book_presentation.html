{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Book Presentation — R.U</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0A194E;
  --navy2:#0D2260;
  --amber:#FFC107;
  --amber2:#FFD54F;
  --amber-dark:#E6AD00;
  --white:#FFFFFF;
  --off:#F7F8FC;
  --off2:#EEF1F8;
  --text:#1A2340;
  --muted:#5A6A8A;
  --soft:#9AAAC0;
  --border:#DDE3F0;
  --green:#1DA462;
  --green-dim:rgba(29,164,98,0.1);
  --red:#E53935;
  --red-dim:rgba(229,57,53,0.1);
  --blue:#1E7EDE;
  --blue-dim:rgba(30,126,222,0.1);
  --orange:#F57C00;
  --orange-dim:rgba(245,124,0,0.1);
  --sidebar-w:230px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--off);
  color:var(--text);
  min-height:100vh;
}
.container{
  max-width:800px;
  margin:0 auto;
  padding:2rem;
}
h1{
  color:var(--navy);
  margin-bottom:2rem;
}
.form-group{
  margin-bottom:1rem;
}
.form-group label{
  display:block;
  margin-bottom:0.5rem;
  font-weight:500;
}
.form-control{
  width:100%;
  padding:0.75rem;
  border:1px solid var(--border);
  border-radius:0.5rem;
  font-size:1rem;
}
.btn{
  background:var(--navy);
  color:var(--white);
  padding:0.75rem 1.5rem;
  border:none;
  border-radius:0.5rem;
  cursor:pointer;
  font-size:1rem;
}
.btn:hover{
  background:var(--navy2);
}
.btn-secondary{
  background:var(--soft);
  color:var(--white);
}
.btn-secondary:hover{
  background:var(--muted);
}
</style>
</head>
<body>
<div class="container">
    <h1>Book Presentation</h1>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.title.id_for_label }}">Title</label>
            {{ form.title }}
        </div>
        <div class="form-group">
            <label for="{{ form.date.id_for_label }}">Date</label>
            {{ form.date }}
        </div>
        <button type="submit" class="btn">Book Presentation</button>
        <a href="{% url 'student_dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
    </form>
</div>
</body>
</html>
