{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Book Presentation — R.U</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0A194E;
  --navy2:#0D2260;
  --amber:#FFC107;
  --amber2:#FFD54F;
  --amber-dark:#E6AD00;
  --white:#FFFFFF;
  --off:#F7F8FC;
  --off2:#EEF1F8;
  --text:#1A2340;
  --muted:#5A6A8A;
  --soft:#9AAAC0;
  --border:#DDE3F0;
  --green:#1DA462;
  --green-dim:rgba(29,164,98,0.1);
  --red:#E53935;
  --red-dim:rgba(229,57,53,0.1);
  --blue:#1E7EDE;
  --blue-dim:rgba(30,126,222,0.1);
  --orange:#F57C00;
  --orange-dim:rgba(245,124,0,0.1);
  --sidebar-w:230px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--off);
  color:var(--text);
  min-height:100vh;
}
.container{
  max-width:760px;
  margin:0 auto;
  padding:2rem;
}
.page-header{
  background:#fff;
  border:1px solid var(--border);
  border-radius:1rem;
  padding:1.75rem 2rem;
  box-shadow:0 18px 55px rgba(13,34,96,0.06);
  margin-bottom:1.75rem;
}
.page-header h1{
  color:var(--navy);
  font-size:2.25rem;
  margin-bottom:0.5rem;
}
.page-header p{
  color:var(--muted);
  line-height:1.8;
  font-size:1rem;
}
.form-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:1rem;
  padding:2rem;
  box-shadow:0 14px 40px rgba(13,34,96,0.05);
}
.section-title{
  margin-bottom:0.5rem;
  font-size:1.15rem;
  font-weight:700;
  color:var(--navy);
}
.section-text{
  margin-bottom:1.75rem;
  color:var(--muted);
  line-height:1.75;
}
.form-group{
  margin-bottom:1.5rem;
}
.form-group label{
  display:block;
  margin-bottom:0.6rem;
  font-weight:600;
  color:var(--text);
}
.form-control,
.form-select{
  width:100%;
  padding:0.95rem 1rem;
  border:1px solid var(--border);
  border-radius:0.75rem;
  font-size:1rem;
  color:var(--text);
  background:#fcfdff;
}
.form-control:focus,
.form-select:focus{
  outline:none;
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(30,126,222,0.12);
}
.form-actions{
  display:flex;
  flex-wrap:wrap;
  gap:1rem;
  align-items:center;
  margin-top:1rem;
}
.btn{
  background:var(--navy);
  color:var(--white);
  padding:0.95rem 1.6rem;
  border:none;
  border-radius:0.75rem;
  cursor:pointer;
  font-size:1rem;
  min-width:180px;
}
.btn:hover{
  background:var(--navy2);
}
.btn-secondary{
  background:var(--soft);
  color:var(--white);
}
.btn-secondary:hover{
  background:var(--muted);
}
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <h1>Book Presentation</h1>
    <p>Request a seminar slot for your presentation</p>
  </div>
  <form method="POST" class="form-card">
    {% csrf_token %}
    <div class="form-group">
      <div class="section-title">New Booking Request</div>
      <div class="section-text">Select the type and your preferred date</div>
    </div>
    <div class="form-group">
      <label for="presentation-type">Presentation Type</label>
      <select id="presentation-type" name="title" class="form-select" required>
                <option value="" disabled selected>Select type</option>
                <option>Proposal Defense / Proposal Seminar</option>
                <option>Progress Seminar</option>
                <option>Final Thesis Defense / Oral Defense</option>
                <option>Pre-Defense Seminar</option>
                <option>Chapter 1: Introduction</option>
                <option>Chapter 2: Literature Review</option>
                <option>Chapter 3: Methodology</option>
                <option>Chapter 4: Data Analysis</option>
                <option>Chapter 5: Discussion</option>
                <option>Chapter 6: Conclusion & Recommendations</option>
                <option>Supervisory Meeting</option>
                <option>Panel Review Meeting</option>
                <option>Ethics / NACOSTI Presentation</option>
                <option>Research Colloquium</option>
                <option>Conference Presentation</option>
                <option>Publication Seminar</option>
                <option>Grant Proposal Presentation</option>
                <option>Correction/Revision Presentation</option>
                <option>Methodology Workshop</option>
            </select>
        </div>
        <div class="form-group">
            <label for="{{ form.meeting_type.id_for_label }}">Mode of Presentation</label>
            {{ form.meeting_type }}
        </div>
        <div class="form-group">
            <label for="{{ form.date.id_for_label }}">Preferred Date & Time</label>
            {{ form.date }}
        </div>
        <div class="form-actions">
            <button type="submit" class="btn">Submit Request</button>
            <a href="{% url 'student_dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </form>
</div>
</body>
</html>
